<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 1 — Стакан стоит, лента летит</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #050608;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ── 9:16 Frame ── */
.frame {
  width: 540px;
  height: 960px;
  background: #0b0d16;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
}

/* ambient glows */
.glow-red {
  position: absolute;
  top: -80px; right: -60px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(255,80,80,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.glow-green {
  position: absolute;
  bottom: 60px; left: -60px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(50,220,130,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── Header ── */
.header {
  position: relative; z-index: 2;
  padding: 20px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 100%);
}
.pair-wrap { display: flex; flex-direction: column; gap: 6px; }
.pair {
  font-size: 24px;
  font-weight: 800;
  color: #eef0f8;
  letter-spacing: 0.3px;
}
.pair em { color: rgba(238,240,248,0.3); font-style: normal; font-weight: 500; }

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: #3a4a70;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #2ecc71;
  box-shadow: 0 0 8px rgba(46,204,113,0.9);
  animation: liveBlink 2s ease-in-out infinite;
}
@keyframes liveBlink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.price-wrap { text-align: right; display: flex; flex-direction: column; gap: 5px; }
.price-main {
  font-size: 32px;
  font-weight: 800;
  color: #f5c842;
  letter-spacing: -1px;
  text-shadow: 0 0 28px rgba(245,200,66,0.4);
}
.price-sub {
  font-size: 11px;
  font-weight: 500;
  color: #3a4a70;
  letter-spacing: 0.2px;
}

/* ── Column labels ── */
.col-labels {
  position: relative; z-index: 2;
  display: flex;
  padding: 8px 24px 7px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  background: rgba(0,0,0,0.1);
}
.col-labels-left {
  flex: 1;
  display: flex;
  padding-right: 10px;
}
.col-labels-right { width: 188px; display: flex; }
.col-label {
  font-size: 10px;
  font-weight: 700;
  color: #252e4a;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  flex: 1;
}
.col-label.c { text-align: center; }
.col-label.r { text-align: right; }

/* ── Body ── */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative; z-index: 2;
}

/* ── Orderbook ── */
.orderbook {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.04);
}
.asks-section {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; overflow: hidden;
}
.bids-section {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

.ob-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5.5px 16px 5.5px 24px;
  position: relative;
  font-size: 13.5px;
  transition: background 0.1s;
}
.ob-row:hover { background: rgba(255,255,255,0.025); }

/* depth bar */
.ob-depth {
  position: absolute;
  top: 0; bottom: 0; right: 0;
  border-radius: 2px 0 0 2px;
}
.ask-depth { background: rgba(255,92,92,0.16); }
.bid-depth { background: rgba(50,220,130,0.16); }

.ob-price { font-weight: 700; min-width: 90px; letter-spacing: 0.1px; position: relative; z-index: 1; }
.ask-row .ob-price { color: #ff5c5c; }
.bid-row .ob-price { color: #32dc82; }

.ob-size {
  color: #c0c8e0;
  min-width: 70px;
  text-align: right;
  font-weight: 600;
  font-size: 13px;
  position: relative; z-index: 1;
}
.ob-total {
  color: #252e4a;
  min-width: 58px;
  text-align: right;
  font-size: 11.5px;
  font-weight: 500;
  position: relative; z-index: 1;
}

/* frozen ask row */
.ask-frozen { animation: frozenPulse 1.3s ease-in-out infinite; }
@keyframes frozenPulse {
  0%,100% { background: transparent; }
  50%     { background: rgba(245,200,66,0.09); }
}

.ice-badge {
  position: absolute;
  right: 14px;
  z-index: 2;
  padding: 2px 7px;
  background: rgba(245,200,66,0.1);
  border: 1px solid rgba(245,200,66,0.3);
  border-radius: 5px;
  font-size: 9px;
  font-weight: 800;
  color: #f5c842;
  letter-spacing: 1.5px;
  text-shadow: 0 0 8px rgba(245,200,66,0.7);
  opacity: 0;
  animation: icePop 1.4s ease-in-out infinite;
}
@keyframes icePop {
  0%,100% { opacity:0; transform:scale(0.85); }
  40%,60% { opacity:1; transform:scale(1); }
}

/* ── Spread / Last price ── */
.spread-row {
  padding: 12px 16px 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(245,200,66,0.12);
  border-bottom: 1px solid rgba(245,200,66,0.12);
  background: rgba(245,200,66,0.035);
}
.spread-lbl {
  font-size: 10px; font-weight: 800;
  color: #3a4a70; letter-spacing: 2px;
}
.spread-price {
  font-size: 23px; font-weight: 800;
  color: #f5c842; letter-spacing: -0.5px;
  text-shadow: 0 0 22px rgba(245,200,66,0.5);
}
.spread-chg {
  font-size: 12px; font-weight: 700;
  color: #32dc82;
}

/* ── Tape ── */
.tape {
  width: 188px;
  overflow: hidden;
  position: relative;
  background: rgba(0,0,0,0.25);
}
.tape-inner {
  position: absolute; top: 0; width: 100%;
  animation: tapeScroll 2.5s linear infinite;
}
@keyframes tapeScroll {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

.tape-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6.5px 12px 6.5px 16px;
  font-size: 12.5px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  position: relative;
  gap: 4px;
}
.t-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 0 2px 2px 0;
}
.tape-sell .t-bar { background: #ff5c5c; box-shadow: 1px 0 6px rgba(255,92,92,0.5); }
.tape-buy  .t-bar { background: #32dc82; box-shadow: 1px 0 6px rgba(50,220,130,0.5); }

.t-time { font-size: 10px; font-weight: 500; color: #252e4a; min-width: 40px; }
.t-price { font-weight: 700; font-size: 13px; flex: 1; text-align: center; }
.tape-sell .t-price { color: #ff5c5c; }
.tape-buy  .t-price { color: #32dc82; }
.t-vol { font-size: 11.5px; font-weight: 600; min-width: 36px; text-align: right; }
.tape-sell .t-vol { color: #7a2828; }
.tape-buy  .t-vol { color: #1a6035; }

.tape-big { animation: bigFlash 0.65s ease-out; }
@keyframes bigFlash {
  0%   { background: rgba(245,200,66,0.2); }
  100% { background: transparent; }
}

/* ── Footer ── */
.footer {
  position: relative; z-index: 2;
  padding: 13px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(0deg, rgba(255,255,255,0.02) 0%, transparent 100%);
}
.f-col { display: flex; flex-direction: column; gap: 4px; }
.f-col.c { align-items: center; }
.f-col.r { align-items: flex-end; }
.f-lbl { font-size: 10px; font-weight: 700; color: #252e4a; text-transform: uppercase; letter-spacing: 1.3px; }
.f-val { font-size: 15px; font-weight: 700; }

/* ── CVD widget ── */
.cvd-widget {
  position: absolute;
  bottom: 68px; left: 22px;
  z-index: 5;
  background: rgba(8,10,18,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(50,220,130,0.22);
  border-radius: 12px;
  padding: 11px 18px;
  min-width: 128px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
}
.cvd-lbl {
  font-size: 10px; font-weight: 700;
  color: #3a4a70; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 5px;
}
.cvd-row { display: flex; align-items: baseline; gap: 5px; }
.cvd-num {
  font-size: 24px; font-weight: 800;
  color: #32dc82; letter-spacing: -1px;
  text-shadow: 0 0 14px rgba(50,220,130,0.55);
}
.cvd-arr {
  font-size: 17px; color: #32dc82;
  animation: arrPulse 1s ease-in-out infinite;
}
@keyframes arrPulse {
  0%,100%{ opacity:0.2; transform:translateY(0); }
  50%    { opacity:1;   transform:translateY(-2px); }
}
</style>
</head>
<body>
<div class="frame">
  <div class="glow-red"></div>
  <div class="glow-green"></div>

  <!-- Header -->
  <div class="header">
    <div class="pair-wrap">
      <div class="pair">BTC<em>/USDT</em></div>
      <div class="live-badge"><span class="live-dot"></span>Binance · Spot</div>
    </div>
    <div class="price-wrap">
      <div class="price-main">65,230.00</div>
      <div class="price-sub">+0.00% &nbsp;·&nbsp; 24h Vol 28,441 BTC</div>
    </div>
  </div>

  <!-- Column labels -->
  <div class="col-labels">
    <div class="col-labels-left">
      <span class="col-label">Цена</span>
      <span class="col-label r">Объём</span>
      <span class="col-label r">Итого</span>
    </div>
    <div class="col-labels-right">
      <span class="col-label">Время</span>
      <span class="col-label c">Цена</span>
      <span class="col-label r">Объём</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">
    <div class="orderbook">
      <div class="asks-section" id="asksSection"></div>
      <div class="spread-row">
        <span class="spread-lbl">LAST</span>
        <span class="spread-price">65,230.00</span>
        <span class="spread-chg">▲ 0.00</span>
      </div>
      <div class="bids-section" id="bidsSection"></div>
    </div>
    <div class="tape">
      <div class="tape-inner" id="tapeInner"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="f-col">
      <span class="f-lbl">Bid</span>
      <span class="f-val" style="color:#32dc82">65,229.50</span>
    </div>
    <div class="f-col c">
      <span class="f-lbl">Spread</span>
      <span class="f-val" style="color:#3a4a70">0.50</span>
    </div>
    <div class="f-col r">
      <span class="f-lbl">Ask</span>
      <span class="f-val" style="color:#ff5c5c">65,230.00</span>
    </div>
  </div>

  <!-- CVD -->
  <div class="cvd-widget">
    <div class="cvd-lbl">CVD</div>
    <div class="cvd-row">
      <span class="cvd-num" id="cvdVal">+0.0</span>
      <span class="cvd-arr">↑</span>
    </div>
  </div>
</div>

<script>
const PRICE = 65230.00;
const TICK  = 0.50;
const N     = 12;

function fmt(n, d = 2) {
  return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function rand(a, b) { return a + Math.random() * (b - a); }
function rv(base)   { return base + rand(-base * 0.28, base * 0.28); }

let cvd = 0;

// ── Orderbook ─────────────────────────────────────────────
function buildAsks() {
  const sec = document.getElementById('asksSection');
  sec.innerHTML = '';
  let cum = 0;
  for (let i = N; i >= 1; i--) {
    const price = PRICE + i * TICK;
    const vol   = i === 1 ? rv(18) : rv(5);
    cum += vol;
    const pct = Math.min(cum / 60, 1) * 100;

    const row = document.createElement('div');
    row.className = 'ob-row ask-row' + (i === 1 ? ' ask-frozen' : '');
    if (i === 1) row.id = 'fRow';

    row.innerHTML = `
      <div class="ob-depth ask-depth" style="width:${pct}%"></div>
      <span class="ob-price">${fmt(price)}</span>
      <span class="ob-size" id="av1_${i}">${fmt(vol, 3)}</span>
      <span class="ob-total">${fmt(cum, 2)}</span>
      ${i === 1 ? '<span class="ice-badge">ICE</span>' : ''}
    `;
    sec.appendChild(row);
  }
}

function buildBids() {
  const sec = document.getElementById('bidsSection');
  sec.innerHTML = '';
  let cum = 0;
  for (let i = 1; i <= N; i++) {
    const price = PRICE - TICK - (i - 1) * TICK;
    const vol   = rv(5);
    cum += vol;
    const pct = Math.min(cum / 50, 1) * 100;

    const row = document.createElement('div');
    row.className = 'ob-row bid-row';
    row.innerHTML = `
      <div class="ob-depth bid-depth" style="width:${pct}%"></div>
      <span class="ob-price">${fmt(price)}</span>
      <span class="ob-size">${fmt(vol, 3)}</span>
      <span class="ob-total">${fmt(cum, 2)}</span>
    `;
    sec.appendChild(row);
  }
}

// ── Tape ──────────────────────────────────────────────────
function buildTape() {
  const inner = document.getElementById('tapeInner');
  inner.innerHTML = '';
  const rows = [];
  let s = 23 * 60 + 58;

  for (let i = 0; i < 80; i++) {
    const mm   = String(Math.floor(s / 60)).padStart(2, '0');
    const ss   = String(s % 60).padStart(2, '0');
    const time = `23:${mm}:${ss}`;
    s = Math.max(0, s - Math.floor(rand(0, 3)));

    const vol   = parseFloat(rand(0.15, 3.9).toFixed(3));
    const isBuy = Math.random() > 0.28;
    const big   = vol > 2.8;

    const div = document.createElement('div');
    div.className = 'tape-row ' + (isBuy ? 'tape-buy' : 'tape-sell') + (big ? ' tape-big' : '');
    div.innerHTML = `
      <div class="t-bar"></div>
      <span class="t-time">${time}</span>
      <span class="t-price">${fmt(PRICE)}</span>
      <span class="t-vol">${fmt(vol, 3)}</span>
    `;
    rows.push(div);
  }

  rows.forEach(r => inner.appendChild(r));
  rows.forEach(r => inner.appendChild(r.cloneNode(true)));
}

// ── Frozen level tick ─────────────────────────────────────
let frozenVol = 18.5;

function tickFrozen() {
  const eaten = rand(0.3, 2.1);
  frozenVol  -= eaten;
  cvd        += eaten;

  if (frozenVol < 3.5) frozenVol = rand(16, 23); // refill!

  const el = document.getElementById('av1_1');
  if (el) {
    el.textContent = fmt(frozenVol, 3);
    el.style.color      = '#f5c842';
    el.style.textShadow = '0 0 12px rgba(245,200,66,0.8)';
    setTimeout(() => {
      if (el) { el.style.color = '#c0c8e0'; el.style.textShadow = 'none'; }
    }, 300);
  }

  const cv = document.getElementById('cvdVal');
  if (cv) cv.textContent = '+' + fmt(cvd, 1);
}

// ── Init ──────────────────────────────────────────────────
buildAsks();
buildBids();
buildTape();
setInterval(tickFrozen, 380);
setInterval(buildBids,  3000);
</script>
</body>
</html>
