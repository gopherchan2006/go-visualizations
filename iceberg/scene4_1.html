<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 4 — Лента принтов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050608;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Inter', sans-serif;
}
.frame {
  width: 540px; height: 960px;
  position: relative; overflow: hidden;
  background: #08090f;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  box-shadow: 0 0 80px rgba(0,0,0,0.9);
}
canvas { position: absolute; top: 0; left: 0; width: 540px; height: 960px; z-index: 1; }

/* ── Header ── */
.hdr {
  position: absolute; top: 0; left: 0; right: 0; z-index: 3;
  padding: 22px 28px 18px;
  display: flex; justify-content: space-between; align-items: flex-start;
  background: linear-gradient(180deg, rgba(8,9,15,0.96) 60%, transparent 100%);
}
.hdr-pair { font-size: 24px; font-weight: 800; color: #eef0f8; letter-spacing: 0.3px; }
.hdr-pair em { color: rgba(238,240,248,0.28); font-style: normal; font-weight: 500; }
.hdr-sub { font-size: 10px; font-weight: 700; color: #1e2840; letter-spacing: 1.8px; text-transform: uppercase; margin-top: 5px; }
.hdr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.ice-tag {
  padding: 4px 11px; border-radius: 7px;
  background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.28);
  font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: #f5c842;
  text-shadow: 0 0 8px rgba(245,200,66,0.7);
  animation: icePulse 1.4s ease-in-out infinite;
}
@keyframes icePulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
.live-badge { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; color: #1e2840; letter-spacing: 1.5px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 8px rgba(46,204,113,0.9); animation: ldBlink 2s ease-in-out infinite; }
@keyframes ldBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── Counter band ── */
.cnt-band {
  position: absolute; top: 108px; left: 0; right: 0; z-index: 3;
  height: 68px; padding: 0 24px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(8,9,15,0.94);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(245,200,66,0.1);
}
.cnt-left { display: flex; flex-direction: column; }
.cnt-num {
  font-size: 38px; font-weight: 900; color: #f5c842; line-height: 1;
  letter-spacing: -1.5px;
  text-shadow: 0 0 20px rgba(245,200,66,0.5);
  transition: text-shadow 0.1s;
}
.cnt-sub { font-size: 9px; font-weight: 700; color: rgba(245,200,66,0.3); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
.cnt-right { display: flex; flex-direction: column; align-items: flex-end; }
.cvd-num {
  font-size: 28px; font-weight: 800; color: #32dc82; line-height: 1;
  letter-spacing: -0.5px;
  text-shadow: 0 0 14px rgba(50,220,130,0.45);
}
.cvd-sub { font-size: 9px; font-weight: 700; color: rgba(50,220,130,0.3); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

/* ── Stats ── */
.stats {
  position: absolute; bottom: 92px; left: 0; right: 0; z-index: 3;
  display: flex; padding: 0 16px; gap: 8px;
}
.s-box {
  flex: 1; background: rgba(8,9,15,0.88); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.055); border-radius: 14px;
  padding: 14px 12px 12px; display: flex; flex-direction: column; gap: 3px;
}
.s-box.accent { border-color: rgba(245,200,66,0.2); }
.s-lbl { font-size: 9px; font-weight: 700; color: #1a2235; letter-spacing: 1.8px; text-transform: uppercase; }
.s-val { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; line-height: 1; }
.s-val.y { color: #f5c842; text-shadow: 0 0 12px rgba(245,200,66,0.35); }
.s-val.g { color: #32dc82; text-shadow: 0 0 10px rgba(50,220,130,0.3); }
.s-val.w { color: #eef0f8; }
.s-sub { font-size: 10px; font-weight: 500; color: #1a2235; }

/* ── Footer ── */
.footer {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  height: 90px; padding: 16px 28px;
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(0deg, rgba(8,9,15,0.98) 65%, transparent 100%);
  border-top: 1px solid rgba(255,255,255,0.04);
}
.f-lbl { font-size: 10px; font-weight: 700; color: #1a2235; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.f-price { font-size: 28px; font-weight: 800; color: #eef0f8; letter-spacing: -0.5px; }
.frozen-tag {
  padding: 4px 12px; border-radius: 7px;
  background: rgba(50,220,130,0.08); border: 1px solid rgba(50,220,130,0.2);
  font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: #32dc82;
  animation: ldBlink 2.2s ease-in-out infinite;
}
.f-delta { font-size: 12px; font-weight: 600; color: #172a22; margin-top: 5px; text-align: right; }

/* ── Whale pop ── */
.whale-pop {
  position: absolute; z-index: 5;
  top: 184px; right: 16px;
  padding: 6px 12px 6px 9px; border-radius: 9px;
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
  opacity: 0; transform: translateX(16px);
  transition: opacity 0.12s ease, transform 0.12s ease;
  pointer-events: none;
}
.whale-pop.buy  { background: rgba(50,220,130,0.12); border: 1px solid rgba(50,220,130,0.35); color: #32dc82; }
.whale-pop.sell { background: rgba(255,92,92,0.12);  border: 1px solid rgba(255,92,92,0.35);  color: #ff5c5c; }
.whale-pop.visible { opacity: 1; transform: translateX(0); }
</style>
</head>
<body>
<div class="frame">
  <canvas id="c" width="540" height="960"></canvas>

  <div class="hdr">
    <div>
      <div class="hdr-pair">BTC<em>/USDT</em></div>
      <div class="hdr-sub">Шквал принтов — уровень держится</div>
    </div>
    <div class="hdr-right">
      <div class="ice-tag">⬡ ICE</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>

  <div class="cnt-band">
    <div class="cnt-left">
      <div class="cnt-num" id="cntNum">×0</div>
      <div class="cnt-sub">Сделок на уровне</div>
    </div>
    <div class="cnt-right">
      <div class="cvd-num" id="cvdNum">+0.0</div>
      <div class="cvd-sub">CVD BTC</div>
    </div>
  </div>

  <div class="whale-pop" id="whalePop">
    <span id="whaleIcon">▲</span><span id="whaleText">0.000 BTC</span>
  </div>

  <div class="stats">
    <div class="s-box accent">
      <div class="s-lbl">Сделок</div>
      <div class="s-val y" id="sCnt">0</div>
      <div class="s-sub">подряд на цене</div>
    </div>
    <div class="s-box">
      <div class="s-lbl">Объём</div>
      <div class="s-val w" id="sVol">0.0</div>
      <div class="s-sub">BTC торговый</div>
    </div>
    <div class="s-box">
      <div class="s-lbl">CVD Δ</div>
      <div class="s-val g" id="sCvd">+0</div>
      <div class="s-sub">нарастающий</div>
    </div>
  </div>

  <div class="footer">
    <div>
      <div class="f-lbl">Last Price</div>
      <div class="f-price">65,230.00</div>
    </div>
    <div style="text-align:right">
      <div class="frozen-tag">FROZEN</div>
      <div class="f-delta">Δ 0.00 USD (0.000%)</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 540, H = 960;

const TAPE_TOP = 178;  // pixels from top (below counter band)
const TAPE_BOT = 750;
const ROW_H    = 44;
const SPD      = 3.5;  // px per frame

let rows     = [];
let counter  = 0;
let cvd      = 0;
let totalVol = 0;
let frameN   = 0;
let milestoneFlash = 0;
let whalePop       = document.getElementById('whalePop');
let whaleTimer     = 0;

// Small ambient particles floating in bg
let bgParts = [];
for (let i = 0; i < 40; i++) {
  bgParts.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.15,
    vy: -Math.random() * 0.2 - 0.05,
    r:  Math.random() * 1.5 + 0.3,
    a:  Math.random() * 0.08 + 0.02,
    col: Math.random() > 0.5 ? '#32dc82' : '#f5c842'
  });
}

// ── Helpers ──
function rnd(a, b) { return a + Math.random() * (b - a); }

function fmtTime(n) {
  const base = 9 * 3600 + 41 * 60 + 23;
  const t = base + Math.round(n * 0.45);
  const h = Math.floor(t / 3600) % 24;
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Rounded rect path helper (fills current path)
function RR(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

// ── Spawn trade ──
const PRICES = ['65,230.00','65,230.00','65,230.00','65,230.00','65,230.00',
                '65,230.01','65,229.99','65,230.00','65,230.00','65,230.01'];

function spawnTrade() {
  const buy = Math.random() < 0.55;   // 55% buys → CVD grows

  let sz;
  const r = Math.random();
  if      (r > 0.94) sz = rnd(3.5, 8.0);  // whale  6%
  else if (r > 0.82) sz = rnd(1.2, 3.5);  // big   12%
  else if (r > 0.58) sz = rnd(0.25, 1.2); // med   24%
  else               sz = rnd(0.008, 0.25);// small 58%
  sz = parseFloat(sz.toFixed(3));

  const price = PRICES[Math.floor(Math.random() * PRICES.length)];
  const big   = sz >= 1.2;
  const whale = sz >= 3.5;

  rows.unshift({
    y:     TAPE_TOP,
    side:  buy ? 'BUY' : 'SELL',
    price, sz,
    time:  fmtTime(counter),
    alpha: 0,
    big, whale,
    fl:    whale ? 1.0 : (big ? 0.5 : 0),
    birth: frameN
  });

  counter++;
  cvd      += sz * (buy ? 1 : -1);
  totalVol += sz;

  // Milestone glow on counter
  if (counter % 50 === 0) milestoneFlash = 1.0;

  // Whale pop notification
  if (whale) {
    const pop = document.getElementById('whalePop');
    pop.className = 'whale-pop ' + (buy ? 'buy' : 'sell');
    document.getElementById('whaleIcon').textContent = buy ? '▲' : '▼';
    document.getElementById('whaleText').textContent = sz.toFixed(2) + ' BTC КРУПНАЯ';
    pop.classList.add('visible');
    whaleTimer = 90;
  }

  updateStats();
  while (rows.length > 35) rows.pop();
}

function updateStats() {
  document.getElementById('cntNum').textContent  = '×' + counter;
  document.getElementById('cvdNum').textContent  = (cvd >= 0 ? '+' : '') + cvd.toFixed(1);
  document.getElementById('sCnt').textContent    = counter;
  document.getElementById('sVol').textContent    = totalVol.toFixed(1);
  document.getElementById('sCvd').textContent    = (cvd >= 0 ? '+' : '') + Math.round(cvd);

  if (milestoneFlash > 0) {
    document.getElementById('cntNum').style.textShadow =
      `0 0 ${32 * milestoneFlash}px rgba(245,200,66,${milestoneFlash * 0.9})`;
  } else {
    document.getElementById('cntNum').style.textShadow = '0 0 20px rgba(245,200,66,0.5)';
  }
}

// ── Draw single row ──
function drawRow(row) {
  const { y, side, price, sz, alpha, big, whale, fl } = row;
  if (y + ROW_H < TAPE_TOP || y > TAPE_BOT) return;
  const buy = side === 'BUY';
  const a   = Math.max(0, Math.min(1, alpha));
  if (a <= 0) return;

  ctx.save();
  ctx.globalAlpha = a;

  // ── Row background ──
  if (whale) {
    const bg = ctx.createLinearGradient(0, y, W, y);
    bg.addColorStop(0,   buy ? 'rgba(50,220,130,0.14)' : 'rgba(255,92,92,0.14)');
    bg.addColorStop(0.65, buy ? 'rgba(50,220,130,0.06)' : 'rgba(255,92,92,0.06)');
    bg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, y, W, ROW_H);
    // Left accent
    ctx.fillStyle   = buy ? '#32dc82' : '#ff5c5c';
    ctx.shadowColor = buy ? '#32dc82' : '#ff5c5c';
    ctx.shadowBlur  = 16;
    ctx.fillRect(0, y + 3, 3, ROW_H - 6);
    ctx.shadowBlur  = 0;
  } else if (big) {
    ctx.fillStyle = buy ? 'rgba(50,220,130,0.05)' : 'rgba(255,92,92,0.05)';
    ctx.fillRect(0, y, W, ROW_H);
    ctx.fillStyle = buy ? 'rgba(50,220,130,0.5)' : 'rgba(255,92,92,0.5)';
    ctx.fillRect(0, y + 5, 2, ROW_H - 10);
  } else {
    const rowIdx = Math.round((y - TAPE_TOP) / ROW_H);
    if (rowIdx % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.01)';
      ctx.fillRect(0, y, W, ROW_H);
    }
  }

  // Separator
  ctx.fillStyle = 'rgba(255,255,255,0.022)';
  ctx.fillRect(0, y + ROW_H - 1, W, 1);

  // ── TIME ──
  ctx.font         = '500 11px Inter';
  ctx.fillStyle    = 'rgba(255,255,255,0.14)';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(row.time, 16, y + ROW_H / 2);

  // ── SIDE chip ──
  const cx = 92, cw = 48, ch = 20;
  const cy = y + ROW_H / 2 - ch / 2;
  RR(cx, cy, cw, ch, 5);
  ctx.fillStyle   = buy ? 'rgba(50,220,130,0.16)' : 'rgba(255,92,92,0.16)';
  ctx.fill();
  ctx.strokeStyle = buy ? 'rgba(50,220,130,0.45)' : 'rgba(255,92,92,0.45)';
  ctx.lineWidth   = 0.8;
  ctx.stroke();
  ctx.font         = '700 10px Inter';
  ctx.textAlign    = 'center';
  ctx.fillStyle    = buy ? '#32dc82' : '#ff5c5c';
  if (whale) { ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8; }
  ctx.fillText(side, cx + cw / 2, y + ROW_H / 2);
  ctx.shadowBlur = 0;

  // ── PRICE ──
  const exact = price === '65,230.00';
  const pCol  = whale
    ? (buy ? '#32dc82' : '#ff5c5c')
    : (exact ? '#f5c842' : 'rgba(238,240,248,0.45)');
  ctx.font      = whale ? '800 16px Inter' : (big ? '700 15px Inter' : '500 14px Inter');
  ctx.fillStyle = pCol;
  if (exact && big) { ctx.shadowColor = '#f5c842'; ctx.shadowBlur = 8; }
  ctx.textAlign = 'center';
  ctx.fillText(price, 308, y + ROW_H / 2);
  ctx.shadowBlur = 0;

  // ── SIZE ──
  ctx.font      = big ? '700 13px Inter' : '500 12px Inter';
  ctx.fillStyle = whale
    ? pCol
    : (big ? 'rgba(238,240,248,0.82)' : 'rgba(238,240,248,0.34)');
  ctx.textAlign = 'right';
  ctx.fillText(sz.toFixed(3) + ' BTC', W - 16, y + ROW_H / 2);

  ctx.restore();
}

// ── Draw column headers ──
function drawColHeaders() {
  const y = TAPE_TOP - 17;
  ctx.save();
  ctx.font         = '600 9px Inter';
  ctx.fillStyle    = 'rgba(255,255,255,0.1)';
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'left';  ctx.fillText('ВРЕМЯ', 16, y);
  ctx.textAlign    = 'center';
  ctx.fillText('СТОРОНА', 116, y);
  ctx.fillText('ЦЕНА', 308, y);
  ctx.textAlign    = 'right';  ctx.fillText('ОБЪЁМ', W - 16, y);
  ctx.restore();
}

// ── Draw CVD bar (right thin bar) ──
function drawCvdBar() {
  const bx   = W - 10, bw = 5;
  const bTop = TAPE_TOP + 8, bBot = TAPE_BOT - 8;
  const bH   = bBot - bTop;

  // Track
  RR(bx, bTop, bw, bH, 2);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();

  // Fill
  const maxV = 500;
  const pct  = Math.min(1, Math.abs(cvd) / maxV);
  const fH   = bH * pct;
  if (fH > 2) {
    const fc = cvd >= 0 ? '#32dc82' : '#ff5c5c';
    const fy = cvd >= 0 ? bBot - fH : bTop;
    const fg = ctx.createLinearGradient(0, fy, 0, fy + fH);
    fg.addColorStop(0, fc + '40'); fg.addColorStop(1, fc + 'cc');
    RR(bx, fy, bw, fH, 2);
    ctx.fillStyle   = fg;
    ctx.shadowColor = fc;
    ctx.shadowBlur  = 10;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }
}

// ── Draw pulse effect on tape border ──
function drawTapeBorder() {
  // Subtle left glow border
  const lg = ctx.createLinearGradient(0, TAPE_TOP, 0, TAPE_BOT);
  lg.addColorStop(0,   'rgba(245,200,66,0.0)');
  lg.addColorStop(0.3, 'rgba(245,200,66,0.06)');
  lg.addColorStop(0.7, 'rgba(245,200,66,0.06)');
  lg.addColorStop(1,   'rgba(245,200,66,0.0)');
  ctx.fillStyle = lg;
  ctx.fillRect(0, TAPE_TOP, 2, TAPE_BOT - TAPE_TOP);
}

// ── UPDATE ──
function update() {
  frameN++;

  for (let i = rows.length - 1; i >= 0; i--) {
    const row = rows[i];
    row.y += SPD;

    const age = frameN - row.birth;
    if (age < 9) row.alpha = age / 9; else row.alpha = 1;

    const distBot = TAPE_BOT - row.y;
    if (distBot < ROW_H * 2.5) row.alpha = Math.min(row.alpha, distBot / (ROW_H * 2.5));

    if (row.fl > 0) row.fl -= 0.055;
    if (row.y > TAPE_BOT + ROW_H) rows.splice(i, 1);
  }

  // Background particles
  for (const p of bgParts) {
    p.x += p.vx; p.y += p.vy;
    if (p.y < 0) { p.y = H; p.x = Math.random() * W; }
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
  }

  if (milestoneFlash > 0) milestoneFlash = Math.max(0, milestoneFlash - 0.025);
  if (whaleTimer > 0) {
    whaleTimer--;
    if (whaleTimer === 0) whalePop.classList.remove('visible');
  }
}

// ── DRAW ──
function draw() {
  ctx.fillStyle = '#08090f';
  ctx.fillRect(0, 0, W, H);

  // Ambient bg particles
  for (const p of bgParts) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle    = p.col;
    ctx.globalAlpha  = p.a;
    ctx.fill();
    ctx.globalAlpha  = 1;
  }

  // Ambient center glow
  const ag = ctx.createRadialGradient(W / 2, H * 0.5, 0, W / 2, H * 0.5, W * 0.9);
  ag.addColorStop(0, 'rgba(50,220,130,0.03)');
  ag.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ag;
  ctx.fillRect(0, 0, W, H);

  // Left tape border glow
  drawTapeBorder();

  // Column headers
  drawColHeaders();

  // ── TAPE CLIP ──
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, TAPE_TOP, W, TAPE_BOT - TAPE_TOP);
  ctx.clip();

  // Tape bg tint
  ctx.fillStyle = 'rgba(255,255,255,0.005)';
  ctx.fillRect(0, TAPE_TOP, W, TAPE_BOT - TAPE_TOP);

  // Rows (back→front so newest is on top)
  for (let i = rows.length - 1; i >= 0; i--) drawRow(rows[i]);

  // Whale flash overlay
  for (const row of rows) {
    if (row.fl > 0) {
      const buy = row.side === 'BUY';
      ctx.fillStyle =
        (buy ? 'rgba(50,220,130,' : 'rgba(255,92,92,') + (row.fl * 0.16) + ')';
      ctx.fillRect(0, row.y, W, ROW_H);
    }
  }

  // ── FADE MASKS ──
  const topFade = ctx.createLinearGradient(0, TAPE_TOP, 0, TAPE_TOP + ROW_H * 1.5);
  topFade.addColorStop(0, 'rgba(8,9,15,0.97)');
  topFade.addColorStop(1, 'rgba(8,9,15,0)');
  ctx.fillStyle = topFade;
  ctx.fillRect(0, TAPE_TOP, W, ROW_H * 1.5);

  const botFade = ctx.createLinearGradient(0, TAPE_BOT - ROW_H * 2.5, 0, TAPE_BOT);
  botFade.addColorStop(0, 'rgba(8,9,15,0)');
  botFade.addColorStop(1, 'rgba(8,9,15,0.97)');
  ctx.fillStyle = botFade;
  ctx.fillRect(0, TAPE_BOT - ROW_H * 2.5, W, ROW_H * 2.5);

  ctx.restore();

  // ── WATERMARK counter (over tape, faint) ──
  const midY = (TAPE_TOP + TAPE_BOT) / 2;
  ctx.save();
  ctx.globalAlpha = 0.03 + milestoneFlash * 0.04;
  ctx.font = '900 108px Inter';
  ctx.fillStyle    = '#f5c842';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('×' + counter, W / 2 - 4, midY - 10);
  ctx.font = '800 25px Inter';
  ctx.fillText('СДЕЛОК', W / 2, midY + 68);
  ctx.restore();

  // CVD bar (right edge, outside tape clip)
  drawCvdBar();
}

// ── LOOP ──
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ── SPAWN ──
// Base 62ms + occasional double-tap burst
let spawnBase = 62;

setInterval(() => {
  spawnTrade();
  // Double tap: 38% chance
  if (Math.random() > 0.62) setTimeout(spawnTrade, rnd(12, 42));
  // Triple on hot streaks: 12% chance
  if (Math.random() > 0.88) setTimeout(spawnTrade, rnd(44, 80));
}, spawnBase);

document.fonts.ready.then(() => requestAnimationFrame(loop));
</script>
</body>
