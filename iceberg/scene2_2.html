<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 2 — Айсберг</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

.frame {
  width: 540px;
  height: 960px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  box-shadow: 0 0 100px rgba(0,0,0,0.9);
}

canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* ── Overlay labels ── */
.lbl-vis {
  position: absolute;
  left: 28px; top: 118px;
  z-index: 10;
  opacity: 0;
  animation: fadeDown 0.65s ease-out 0.4s forwards;
}
.lbl-hid {
  position: absolute;
  left: 28px; top: 500px;
  z-index: 10;
  opacity: 0;
  animation: fadeUp 0.7s ease-out 1.5s forwards;
}
.lbl-tag {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 5px;
}
.lbl-tag.vis { color: rgba(130,195,255,0.65); }
.lbl-tag.hid { color: rgba(40,100,200,0.55); }

.lbl-val {
  font-size: 46px; font-weight: 900;
  letter-spacing: -2px; line-height: 1;
}
.lbl-val.vis { color: #f5c842; text-shadow: 0 0 32px rgba(245,200,66,0.45); }
.lbl-val.hid { color: #1e5ec8; text-shadow: 0 0 40px rgba(20,80,200,0.4); }

.lbl-sub {
  font-size: 12px; font-weight: 600; margin-top: 6px;
}
.lbl-sub.vis { color: rgba(245,200,66,0.4); }
.lbl-sub.hid { color: rgba(30,100,200,0.4); }

/* ×99 */
.mult {
  position: absolute;
  right: 22px; top: 518px;
  z-index: 10; text-align: right;
  opacity: 0;
  animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) 2.3s forwards;
}
.mult-val {
  font-size: 88px; font-weight: 900;
  color: rgba(18,65,175,0.72);
  letter-spacing: -4px; line-height: 1;
  text-shadow: 0 0 55px rgba(18,65,190,0.35);
  animation: multPulse 2.8s ease-in-out 2.8s infinite;
}
@keyframes multPulse {
  0%,100%{ text-shadow: 0 0 55px rgba(18,65,190,0.35); }
  50%    { text-shadow: 0 0 80px rgba(18,65,190,0.6); }
}
.mult-sub {
  font-size: 11px; font-weight: 600;
  color: rgba(18,65,175,0.4);
  letter-spacing: 0.5px; margin-top: 3px;
}

/* Orderbook panel */
.ob-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 0 22px 22px;
  background: linear-gradient(transparent, rgba(4,7,14,0.96) 28%, #04070e 100%);
  opacity: 0;
  animation: fadeUp 0.65s ease-out 3.1s forwards;
}
.ob-r {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 16px; border-radius: 10px;
  margin-bottom: 8px; font-size: 14px; font-weight: 700;
}
.ob-r.ask {
  border: 1px solid rgba(255,92,92,0.15);
  background: rgba(255,92,92,0.05);
}
.ob-r.ice {
  border: 1px solid rgba(245,200,66,0.3);
  background: rgba(245,200,66,0.05);
  animation: icePulse 1.6s ease-in-out 3.6s infinite;
}
@keyframes icePulse {
  0%,100% { border-color: rgba(245,200,66,0.3); box-shadow: none; }
  50%     { border-color: rgba(245,200,66,0.65); box-shadow: 0 0 16px rgba(245,200,66,0.1); }
}
.ob-p { flex: 1; }
.ob-p.a { color: #ff5c5c; }
.ob-p.i { color: #f5c842; }
.ob-v { color: rgba(255,255,255,0.5); font-size: 13px; min-width: 78px; text-align: right; }
.ob-bdg {
  margin-left: 10px; font-size: 9px; font-weight: 800;
  padding: 2px 8px; border-radius: 4px; letter-spacing: 1.2px;
}
.ob-bdg.a { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.2); color: rgba(255,92,92,0.45); }
.ob-bdg.i {
  background: rgba(245,200,66,0.15); border: 1px solid rgba(245,200,66,0.4);
  color: #f5c842; text-shadow: 0 0 5px rgba(245,200,66,0.5);
}

@keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:translateY(0)} }
@keyframes popIn    { from{opacity:0;transform:scale(0.6)} to{opacity:1;transform:scale(1)} }
</style>
</head>
<body>
<div class="frame">
  <canvas id="c" width="540" height="960"></canvas>

  <div class="lbl-vis">
    <div class="lbl-tag vis">Видимо в стакане</div>
    <div class="lbl-val vis">50 BTC</div>
    <div class="lbl-sub vis">верхушка айсберга</div>
  </div>

  <div class="lbl-hid">
    <div class="lbl-tag hid">Скрыто от рынка</div>
    <div class="lbl-val hid">4 950 BTC</div>
    <div class="lbl-sub hid">резервный объём</div>
  </div>

  <div class="mult">
    <div class="mult-val">×99</div>
    <div class="mult-sub">больше реального</div>
  </div>

  <div class="ob-panel">
    <div class="ob-r ask">
      <span class="ob-p a">65,231.00</span>
      <span class="ob-v">4.820</span>
      <span class="ob-bdg a">ASK</span>
    </div>
    <div class="ob-r ice">
      <span class="ob-p i">65,230.00</span>
      <span class="ob-v" id="iceVol">50.000</span>
      <span class="ob-bdg i">ICE ◆</span>
    </div>
  </div>
</div>

<script>
const C   = document.getElementById('c');
const ctx = C.getContext('2d');
const W   = 540, H = 960;

// ── Scene constants ────────────────────────────────────────
const MX = 418, MY = 72, MR = 27;   // Moon
const ICX = 258;                     // Iceberg center X
const WY  = 400;                     // Waterline Y

// ── Stars ─────────────────────────────────────────────────
const STARS = Array.from({ length: 145 }, () => ({
  x: Math.random() * W,
  y: 8 + Math.random() * (WY - 65),
  r: 0.22 + Math.random() * 1.55,
  ph: Math.random() * Math.PI * 2,
  fr: 0.55 + Math.random() * 2.3,
}));

// ── Bubbles ───────────────────────────────────────────────
const BUBBLES = Array.from({ length: 24 }, () => ({
  x: ICX - 75 + Math.random() * 150,
  y: WY + 60  + Math.random() * 360,
  r: 1.1 + Math.random() * 3.4,
  vy: 0.3 + Math.random() * 0.75,
  wx: Math.random() * Math.PI * 2,
  a:  0.18 + Math.random() * 0.32,
}));

// ── Rain-like sparkles on water ────────────────────────────
const SPARKS = Array.from({ length: 30 }, () => ({
  x: Math.random() * W,
  y: WY - 2 + Math.random() * 8,
  ph: Math.random() * Math.PI * 2,
}));

let t = 0;

function render() {
  t += 0.011;
  const bob = Math.sin(t * 0.48) * 5.5;

  // ── SKY ───────────────────────────────────────────────
  const sk = ctx.createLinearGradient(0, 0, 0, WY);
  sk.addColorStop(0,   '#010205');
  sk.addColorStop(0.45,'#010910');
  sk.addColorStop(1,   '#011122');
  ctx.fillStyle = sk;
  ctx.fillRect(0, 0, W, WY + 15);

  // ── STARS ─────────────────────────────────────────────
  STARS.forEach(s => {
    const a = 0.35 + 0.65 * Math.abs(Math.sin(t * s.fr + s.ph));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    ctx.fill();
  });

  // ── MOON HALO ─────────────────────────────────────────
  const h = ctx.createRadialGradient(MX, MY, MR, MX, MY, 95);
  h.addColorStop(0,   'rgba(175,210,255,0.14)');
  h.addColorStop(0.45,'rgba(140,185,255,0.07)');
  h.addColorStop(1,   'transparent');
  ctx.beginPath(); ctx.arc(MX, MY, 95, 0, Math.PI * 2);
  ctx.fillStyle = h; ctx.fill();

  // Second, tighter glow ring (animates softly)
  const halo2a = 0.08 + 0.04 * Math.sin(t * 0.8);
  const h2 = ctx.createRadialGradient(MX, MY, MR, MX, MY, 52);
  h2.addColorStop(0, `rgba(200,225,255,${halo2a})`);
  h2.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(MX, MY, 52, 0, Math.PI * 2);
  ctx.fillStyle = h2; ctx.fill();

  // ── MOON PATH ON WATER (light column) ─────────────────
  const mp = ctx.createLinearGradient(MX, MY + MR, MX, WY - 10);
  mp.addColorStop(0, 'rgba(210,230,255,0.0)');
  mp.addColorStop(1, 'rgba(210,230,255,0.055)');
  ctx.beginPath();
  ctx.moveTo(MX, MY + MR);
  ctx.lineTo(MX - 38, WY - 10);
  ctx.lineTo(MX + 38, WY - 10);
  ctx.closePath();
  ctx.fillStyle = mp; ctx.fill();

  // ── MOON SURFACE ──────────────────────────────────────
  const mg = ctx.createRadialGradient(MX - 8, MY - 8, 0, MX, MY, MR);
  mg.addColorStop(0,    '#f3f8ff');
  mg.addColorStop(0.55, '#d6e8fa');
  mg.addColorStop(1,    '#98bae0');
  ctx.beginPath(); ctx.arc(MX, MY, MR, 0, Math.PI * 2);
  ctx.fillStyle = mg; ctx.fill();
  // Craters
  [[MX+9, MY-6, 5, 0.22], [MX-7, MY+9, 4, 0.18], [MX+1, MY+4, 2.5, 0.14]].forEach(([cx,cy,cr,a]) => {
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2);
    ctx.fillStyle = `rgba(128,158,210,${a})`; ctx.fill();
  });

  // ── UNDERWATER BG ─────────────────────────────────────
  const uw = ctx.createLinearGradient(0, WY, 0, H);
  uw.addColorStop(0,   '#011020');
  uw.addColorStop(0.3, '#010c1a');
  uw.addColorStop(0.65,'#010814');
  uw.addColorStop(1,   '#00050d');
  ctx.fillStyle = uw;
  ctx.fillRect(0, WY, W, H - WY);

  // ── ICEBERG BODY (below waterline) ────────────────────
  {
    const by = WY + bob;
    ctx.beginPath();
    ctx.moveTo(188, by);
    ctx.lineTo(328, by);
    ctx.lineTo(408, by + 72);
    ctx.lineTo(428, by + 162);
    ctx.lineTo(422, by + 255);
    ctx.lineTo(392, by + 328);
    ctx.lineTo(342, by + 375);
    ctx.lineTo(282, by + 398);
    ctx.lineTo(258, by + 400);
    ctx.lineTo(232, by + 398);
    ctx.lineTo(172, by + 375);
    ctx.lineTo(122, by + 328);
    ctx.lineTo(88,  by + 255);
    ctx.lineTo(82,  by + 162);
    ctx.lineTo(102, by + 72);
    ctx.closePath();

    const bg = ctx.createLinearGradient(ICX, by, ICX, by + 400);
    bg.addColorStop(0,   'rgba(10, 42, 115, 0.94)');
    bg.addColorStop(0.28,'rgba(7,  30,  88, 0.9)');
    bg.addColorStop(0.6, 'rgba(4,  18,  58, 0.87)');
    bg.addColorStop(1,   'rgba(2,   8,  30, 0.82)');
    ctx.fillStyle = bg; ctx.fill();

    // Inner glow (light filtering from above)
    const ig = ctx.createRadialGradient(ICX, by + 120, 0, ICX, by + 120, 200);
    ig.addColorStop(0, 'rgba(18,65,185,0.2)');
    ig.addColorStop(1, 'transparent');
    ctx.fillStyle = ig; ctx.fill();

    // Left edge highlight
    ctx.beginPath();
    ctx.moveTo(188, by);
    ctx.lineTo(102, by + 72);
    ctx.lineTo(82,  by + 162);
    ctx.lineTo(88,  by + 255);
    ctx.strokeStyle = 'rgba(28,78,195,0.52)';
    ctx.lineWidth = 2; ctx.stroke();

    // Right edge
    ctx.beginPath();
    ctx.moveTo(328, by);
    ctx.lineTo(408, by + 72);
    ctx.lineTo(428, by + 162);
    ctx.lineTo(422, by + 255);
    ctx.strokeStyle = 'rgba(18,55,160,0.35)';
    ctx.lineWidth = 2; ctx.stroke();

    // Horizontal structure lines
    [[165, 340, by+52, by+52], [125, 380, by+140, by+140],
     [92,  408, by+235, by+235], [105, 395, by+315, by+315]].forEach(([x1,x2,y1,y2], i) => {
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.strokeStyle = `rgba(22,68,165,${0.10 - i * 0.018})`;
      ctx.lineWidth = 1; ctx.stroke();
    });
  }

  // ── CAUSTICS ──────────────────────────────────────────
  for (let i = 0; i < 11; i++) {
    const cx = 55  + i * 44 + Math.sin(t * 0.55 + i * 1.1) * 24;
    const cy = WY  + 48 + (i % 4) * 55 + Math.sin(t * 0.42 + i * 0.95) * 20;
    const r  = 17  + Math.sin(t * 1.05 + i) * 7;
    const a  = 0.022 + 0.017 * Math.sin(t * 1.35 + i * 0.65);
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    cg.addColorStop(0, `rgba(45,125,218,${(a * 2.8).toFixed(3)})`);
    cg.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = cg; ctx.fill();
  }

  // ── BUBBLES ───────────────────────────────────────────
  BUBBLES.forEach(b => {
    b.y -= b.vy;
    b.x += Math.sin(t * 1.7 + b.wx) * 0.45;
    if (b.y < WY + 8) {
      b.y = WY + 180 + Math.random() * 220;
      b.x = ICX - 65 + Math.random() * 130;
    }
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(85,165,255,${b.a})`;
    ctx.lineWidth = 0.8; ctx.stroke();
    // Highlight
    ctx.beginPath(); ctx.arc(b.x - b.r * 0.33, b.y - b.r * 0.33, b.r * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,228,255,${b.a * 0.45})`; ctx.fill();
  });

  // ── WATER SURFACE ─────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(0, WY);
  for (let x = 0; x <= W; x += 2) {
    const y = WY
      + Math.sin(x * 0.021 + t * 1.35) * 5.5
      + Math.sin(x * 0.037 - t * 1.85) * 3.2
      + Math.sin(x * 0.009 + t * 0.65) * 7.5;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  const wg = ctx.createLinearGradient(0, WY - 8, 0, WY + 45);
  wg.addColorStop(0,   'rgba(6,48,110,0.93)');
  wg.addColorStop(0.45,'rgba(3,26,68,0.82)');
  wg.addColorStop(1,   'transparent');
  ctx.fillStyle = wg; ctx.fill();

  // Primary wave crest line
  ctx.beginPath();
  for (let x = 0; x <= W; x += 2) {
    const y = WY
      + Math.sin(x * 0.021 + t * 1.35) * 5.5
      + Math.sin(x * 0.037 - t * 1.85) * 3.2
      + Math.sin(x * 0.009 + t * 0.65) * 7.5;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(48,138,228,0.68)';
  ctx.lineWidth = 2; ctx.stroke();

  // Secondary shimmer
  ctx.beginPath();
  for (let x = 0; x <= W; x += 2) {
    const y = WY - 5 + Math.sin(x * 0.027 + t * 2.0) * 2.2 + Math.sin(x * 0.013 - t * 1.1) * 3.2;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(95,175,255,0.18)';
  ctx.lineWidth = 1; ctx.stroke();

  // ── ICEBERG TIP (above waterline) ─────────────────────
  {
    const ty   = WY + bob;
    const apex = [ICX, 92 + bob * 0.2];

    // Right face (moon-lit)
    ctx.beginPath();
    ctx.moveTo(...apex);
    ctx.lineTo(ICX + 74, ty - 94);
    ctx.lineTo(ICX + 85, ty - 32);
    ctx.lineTo(ICX + 80, ty);
    ctx.lineTo(ICX, ty);
    ctx.closePath();
    const rf = ctx.createLinearGradient(ICX, apex[1], ICX + 85, ty);
    rf.addColorStop(0, 'rgba(205,232,255,0.97)');
    rf.addColorStop(1, 'rgba(145,195,238,0.88)');
    ctx.fillStyle = rf; ctx.fill();

    // Left face (shadow)
    ctx.beginPath();
    ctx.moveTo(...apex);
    ctx.lineTo(ICX - 74, ty - 94);
    ctx.lineTo(ICX - 85, ty - 32);
    ctx.lineTo(ICX - 80, ty);
    ctx.lineTo(ICX, ty);
    ctx.closePath();
    const lf = ctx.createLinearGradient(ICX - 85, apex[1], ICX, ty);
    lf.addColorStop(0, 'rgba(155,198,240,0.94)');
    lf.addColorStop(1, 'rgba(105,162,222,0.88)');
    ctx.fillStyle = lf; ctx.fill();

    // Facet lines (internal crystal structure)
    [
      [apex,              [ICX + 28, ty - 58]],
      [apex,              [ICX - 20, ty - 46]],
      [[ICX + 52, ty-78], [ICX + 36, ty - 22]],
      [[ICX - 47, ty-68], [ICX - 28, ty - 18]],
    ].forEach(([a, b]) => {
      ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(b[0], b[1]);
      ctx.strokeStyle = 'rgba(218,240,255,0.3)'; ctx.lineWidth = 0.8; ctx.stroke();
    });

    // Right outline
    ctx.beginPath();
    ctx.moveTo(...apex);
    ctx.lineTo(ICX + 74, ty - 94);
    ctx.lineTo(ICX + 85, ty - 32);
    ctx.lineTo(ICX + 80, ty);
    ctx.strokeStyle = 'rgba(165,215,252,0.55)'; ctx.lineWidth = 1.5; ctx.stroke();

    // Left outline
    ctx.beginPath();
    ctx.moveTo(...apex);
    ctx.lineTo(ICX - 74, ty - 94);
    ctx.lineTo(ICX - 85, ty - 32);
    ctx.lineTo(ICX - 80, ty);
    ctx.strokeStyle = 'rgba(215,238,255,0.72)'; ctx.lineWidth = 1.5; ctx.stroke();

    // Apex sparkle (star cross)
    const sa = 0.5 + 0.5 * Math.sin(t * 2.7);
    ctx.beginPath(); ctx.arc(apex[0], apex[1], 2.8, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${sa})`; ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${sa * 0.55})`; ctx.lineWidth = 1;
    [[apex[0]-9, apex[1], apex[0]+9, apex[1]],
     [apex[0], apex[1]-9, apex[0], apex[1]+9],
     [apex[0]-6, apex[1]-6, apex[0]+6, apex[1]+6],
     [apex[0]+6, apex[1]-6, apex[0]-6, apex[1]+6]].forEach(([x1,y1,x2,y2]) => {
       ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
     });

    // Foam / splash where tip meets water
    for (let i = -4; i <= 4; i++) {
      const fx = ICX + i * 22 + Math.sin(t * 1.9 + i) * 6;
      const fy = ty + Math.sin(t * 3.2 + i * 0.9) * 3.5;
      const fr = 3.5 + Math.abs(i) * 0.5;
      const fa = (0.12 + 0.08 * Math.abs(Math.sin(t * 4 + i))) * (1 - Math.abs(i)/5);
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI*2);
      ctx.fillStyle = `rgba(175,220,255,${fa})`; ctx.fill();
    }
  }

  // ── MOON REFLECTION ON WATER ──────────────────────────
  for (let i = 0; i < 14; i++) {
    const ry  = WY - 18 + i * 4;
    const rw  = 7  + i * 2.8;
    const rx  = MX - rw/2 + Math.sin(t * 1.7 + i * 0.55) * 14;
    const ra  = (0.048 + 0.038 * Math.sin(t * 2.4 + i)) * (1 - i / 16);
    ctx.fillStyle = `rgba(218,232,255,${ra.toFixed(3)})`;
    ctx.fillRect(rx, ry, rw, 3);
  }

  // ── WATERLINE TEXT (canvas) ────────────────────────────
  ctx.save();
  // Dashed line
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(ICX + 96, WY);
  ctx.lineTo(W - 32, WY);
  ctx.strokeStyle = 'rgba(55,150,235,0.38)';
  ctx.lineWidth = 1.2; ctx.stroke();
  ctx.setLineDash([]);
  // Label
  ctx.font = '700 10px Inter';
  ctx.fillStyle = 'rgba(55,150,235,0.55)';
  ctx.textAlign = 'right';
  ctx.fillText('WATERLINE', W - 30, WY - 7);
  ctx.restore();

  requestAnimationFrame(render);
}

// ── Iceberg vol flicker ────────────────────────────────────
const iceVol = document.getElementById('iceVol');
let vol = 50.0;
setInterval(() => {
  vol -= 0.8 + Math.random() * 2.2;
  if (vol < 7) vol = 44 + Math.random() * 9;
  if (iceVol) {
    iceVol.textContent = vol.toFixed(3);
    iceVol.style.color = '#f5c842';
    iceVol.style.textShadow = '0 0 10px rgba(245,200,66,0.7)';
    setTimeout(() => {
      iceVol.style.color = 'rgba(255,255,255,0.5)';
      iceVol.style.textShadow = 'none';
    }, 285);
  }
}, 420);

render();
</script>
</body>
</html>
