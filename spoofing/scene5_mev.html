<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>День из жизни MEV-бота</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:#020304;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;}
.frame{width:540px;height:960px;position:relative;overflow:hidden;background:#06070c;border:1px solid rgba(255,255,255,0.05);border-radius:4px;box-shadow:0 0 80px rgba(0,0,0,0.95);}
canvas{position:absolute;top:0;left:0;}
</style>
</head>
<body>
<div class="frame"><canvas id="c" width="540" height="960"></canvas></div>
<script>
'use strict';
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=540,H=960,CX=270;

// ── Layout ──
const TOP=68,BOT=878;
const LX=8, LW=CX-LX-8;          // left  x=8  w=246
const RX=CX+8, RW=W-RX-8;        // right x=278 w=254

// ── Cycle / Phases ──
const CYCLE=860;
const PH_IDLE   =0.00;
const PH_DETECT =0.10;  // user tx appears in mempool
const PH_CALC   =0.19;  // bot calculates profit
const PH_BID    =0.29;  // bot submits high-gas frontrun tx
const PH_BUILD  =0.40;  // block being assembled
const PH_EXEC   =0.53;  // block confirmed: bot first, user second
const PH_RESULT =0.66;  // results & comparison
const PH_RESET  =0.88;

// ETH price model
const ETH_BASE = 3241.0;
const ETH_BUMP = 3248.8; // after bot buys ETH
const ETH_DUMP = 3239.4; // after bot sells back
function getETH(f){
  const t=(f%CYCLE)/CYCLE, n=Math.sin(f*0.08)*0.6+Math.cos(f*0.13)*0.3;
  if(t<PH_DETECT) return ETH_BASE+n;
  if(t<PH_EXEC)   return lerp(ETH_BASE,ETH_BUMP,sm((t-PH_DETECT)/(PH_EXEC-PH_DETECT)))+n;
  if(t<PH_RESULT) return lerp(ETH_BUMP,ETH_DUMP,sm((t-PH_EXEC)/(PH_RESULT-PH_EXEC)))+n;
  return ETH_DUMP+((t-PH_RESULT)/(1-PH_RESULT))*1.8+n;
}

// ── Helpers ──
function rnd(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}
function sm(t){const c=Math.min(1,Math.max(0,t));return c*c*(3-2*c);}
function eo(t){const c=Math.min(1,Math.max(0,t));return 1-(1-c)*(1-c);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmt2(v){return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtAddr(s){return s.slice(0,6)+'...'+s.slice(-4);}

// ── State ──
let frameN=0,lastCy=-1;
let detectFired=false,calcFired=false,bidFired=false,buildFired=false,execFired=false,crashFired=false;
let botProfit=0,botProfitDisp=0,userLoss=0,userLossDisp=0;
let botGasSpend=0;
let calcProgress=0,calcDone=false;
let blockProgress=0;
let shakeAmt=0,screenFlash=0;
let parts=[],sparks=[],rings=[],floatNums=[],flashes=[],ltns=[];

// ── Price history ──
const N_HIST=246;
let ethHist=new Array(N_HIST).fill(ETH_BASE);

// ── Mempool rows ── (fake background txs)
const MEMPOOL_FAKE=[
  {hash:'0x8f2a...4c19',from:'0xAb34...9E2f',action:'SWAP 0.5 ETH→USDC',gas:'12 gwei',val:'rgba(238,240,248,0.18)'},
  {hash:'0x1d7e...a831',from:'0x3fC2...1Aa0',action:'ADD LIQ ETH/USDT',gas:'15 gwei',val:'rgba(238,240,248,0.18)'},
  {hash:'0x5c9b...2e47',from:'0x9D1b...7f3C',action:'SWAP 2.1 ETH→DAI',gas:'11 gwei',val:'rgba(238,240,248,0.18)'},
  {hash:'0xf4d1...8b02',from:'0x7E5a...4d9B',action:'REMOVE LIQ UNI',gas:'14 gwei',val:'rgba(238,240,248,0.18)'},
  {hash:'0x2a8c...e651',from:'0xC2f8...0E7d',action:'APPROVE USDC',gas:'10 gwei',val:'rgba(238,240,248,0.18)'},
];
// The victim tx
const VICTIM_TX={
  hash:'0x4E7f...9C2a',
  from:'0xDe12...3B8c',
  action:'SWAP 10 ETH→USDC',
  gas:'13 gwei',
  expected: 32410,
  slippage:'1.0%',
};

// ── Bot's own tx ──
const BOT_TX={
  hash:'0xB0T1...F4ke',
  action:'SWAP 12 ETH→USDC',
  gas:'52 gwei',
  type:'FRONTRUN',
};

// ── Logs ──
let botLogs=[],userLogs=[];
function addLog(side,txt,col){
  const a=side==='b'?botLogs:userLogs;
  a.push({text:txt,col,life:1});
  if(a.length>5)a.splice(0,a.length-5);
}

// BG dots
let bgDots=[];
for(let i=0;i<28;i++) bgDots.push({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.03,0.03),vy:rnd(-0.03,0.03),r:rnd(0.3,1.4),a:rnd(0.01,0.035),col:i<14?'#00ffaa':'#9966ff'});

// ── Lightning ──
function drawLtn(x1,y1,x2,y2,col,a,w){
  const pts=[{x:x1,y:y1}];
  for(let i=1;i<5;i++){const tt=i/5;pts.push({x:lerp(x1,x2,tt)+rnd(-12,12),y:lerp(y1,y2,tt)+rnd(-8,8)});}
  pts.push({x:x2,y:y2});
  ctx.save();ctx.globalAlpha=Math.max(0,a);ctx.strokeStyle=col;ctx.lineWidth=w;ctx.shadowColor=col;ctx.shadowBlur=10;
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();
  ctx.strokeStyle='#fff';ctx.lineWidth=w*0.25;ctx.shadowBlur=3;
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();
  ctx.restore();
}

// ── Trigger FX ──
function fxDetect(){
  rings.push({x:RX+RW*0.5,y:TOP+130,r:4,maxR:180,life:1,col:'#9966ff',thick:false});
  floatNums.push({x:LX+LW*0.5,y:TOP+90,text:'TARGET FOUND!',life:1.3,vy:-1.4,col:'#00ffaa',big:false});
  addLog('b','[MEMPOOL] 0x4E7f SWAP 10ETH — +$226 NET','#00ffaa');
  addLog('u','[SWAP] Отправляю 10 ETH → ~32,410 USDC...','rgba(238,240,248,0.5)');
}
function fxCalc(){
  addLog('b','[CALC] Прибыль: +$238 | Газ: $12 | NET: +$226','#f5c842');
}
function fxBid(){
  shakeAmt=6; screenFlash=0.8;
  const bx=LX+LW*0.5,by=TOP+320;
  for(let i=0;i<40;i++){const a2=rnd(-Math.PI*0.8,0.1),s=rnd(3,14);parts.push({x:bx+rnd(-20,20),y:by,vx:Math.cos(a2)*s,vy:Math.sin(a2)*s-1,r:rnd(2,6),life:1,col:i<28?'#00ffaa':'#9966ff'});}
  for(let i=0;i<12;i++){const a2=rnd(-Math.PI*0.85,0.1);sparks.push({x:bx,y:by,vx:Math.cos(a2)*rnd(6,22),vy:Math.sin(a2)*rnd(4,18),life:1,len:rnd(10,34),col:i%2===0?'#00ffaa':'#f5c842'});}
  rings.push({x:bx,y:by,r:4,maxR:220,life:1,col:'#00ffaa',thick:true});
  for(let i=0;i<4;i++) ltns.push({x1:bx,y1:by,x2:bx+rnd(-70,70),y2:by-rnd(60,180),life:1.0,col:i%2===0?'#00ffaa':'#9966ff'});
  floatNums.push({x:bx,y:by-10,text:'GAS: 52 GWEI ⚡',life:1.4,vy:-1.5,col:'#f5c842',big:false});
  addLog('b','[TX] Frontrun отправлен. Gas: 52 gwei','#f5c842');
  addLog('u','[MEMPOOL] Tx pending... ожидаю блок','rgba(238,240,248,0.3)');
}
function fxExec(){
  shakeAmt=10; screenFlash=1.2;
  const bx=LX+LW*0.5,by=TOP+420;
  flashes.push({x:bx,y:by,life:1.0});
  for(let i=0;i<60;i++){const a2=rnd(-Math.PI*0.9,0.05),s=rnd(4,18);parts.push({x:bx+rnd(-18,18),y:by,vx:Math.cos(a2)*s,vy:Math.sin(a2)*s-rnd(1,3),r:rnd(2,8),life:1,col:i<42?'#00ffaa':i<52?'#f5c842':'#ffffff'});}
  for(let i=0;i<20;i++){const a2=rnd(-Math.PI*0.95,0.1);sparks.push({x:bx,y:by,vx:Math.cos(a2)*rnd(8,28),vy:Math.sin(a2)*rnd(6,24),life:1,len:rnd(14,44),col:i%2===0?'#00ffaa':'#f5c842'});}
  rings.push({x:bx,y:by,r:4,maxR:300,life:1,col:'#00ffaa',thick:true});
  for(let j=1;j<=3;j++) setTimeout(()=>rings.push({x:bx,y:by,r:4,maxR:70+j*60,life:1,col:j%2===0?'#9966ff':'#00ffaa',thick:false}),j*100);
  for(let i=0;i<5;i++) ltns.push({x1:bx,y1:by,x2:bx+rnd(-100,100),y2:by-rnd(80,260),life:1.2,col:i<3?'#00ffaa':'#9966ff'});
  botProfit=226; botGasSpend=12;
  floatNums.push({x:LX+LW*0.5,y:by-18,text:'+$'+botProfit+' PROFIT',life:1.8,vy:-1.6,col:'#00ffaa',big:true});
  addLog('b','[BLOCK #22841094] BOT tx #1 — EXECUTED ✓','#00ffaa');
  setTimeout(()=>{
    addLog('b','[SELL] 12 ETH @ 3248.8 | NET: +$226','#00ffaa');
    addLog('u','[BLOCK] Tx #2 — выполнена. Получено: 32,162 USDC','rgba(255,92,92,0.7)');
  },500);
}
function fxCrash(){
  userLoss=248;
  rings.push({x:RX+RW*0.5,y:TOP+580,r:4,maxR:180,life:1,col:'#ff5c5c',thick:false});
  floatNums.push({x:RX+RW*0.5,y:TOP+540,text:'-$248 SLIPPAGE',life:1.6,vy:-1.3,col:'#ff5c5c',big:true});
  addLog('u','[RESULT] Ожидал 32,410 | Получил 32,162','rgba(255,92,92,0.7)');
  setTimeout(()=>addLog('u','[??] Почему такой slippage?','rgba(255,165,0,0.7)'),600);
}

// ── Update ──
function update(){
  frameN++;
  const cf=frameN%CYCLE, ci=Math.floor(frameN/CYCLE), t=cf/CYCLE;
  const price=getETH(frameN);
  ethHist.push(price); ethHist.shift();

  if(ci!==lastCy){
    lastCy=ci;
    detectFired=calcFired=bidFired=buildFired=execFired=crashFired=false;
    botProfit=0; botProfitDisp=0; userLoss=0; userLossDisp=0; botGasSpend=0;
    calcProgress=0; calcDone=false; blockProgress=0;
    botLogs=[]; userLogs=[];
  }

  if(t>=PH_DETECT&&!detectFired){detectFired=true;fxDetect();}
  if(t>=PH_CALC&&!calcFired){calcFired=true;fxCalc();}
  if(t>=PH_BID&&!bidFired){bidFired=true;fxBid();}
  if(t>=PH_EXEC&&!execFired){execFired=true;fxExec();}
  if(t>=PH_RESULT&&!crashFired){crashFired=true;fxCrash();}

  // Calc progress bar
  if(t>=PH_CALC&&t<PH_BID) calcProgress=sm((t-PH_CALC)/(PH_BID-PH_CALC));
  else if(t>=PH_BID) calcProgress=1;
  if(calcProgress>0.98) calcDone=true;

  // Block progress
  if(t>=PH_BID&&t<PH_EXEC) blockProgress=sm((t-PH_BID)/(PH_EXEC-PH_BID));
  else if(t>=PH_EXEC) blockProgress=1;

  // Display counters
  botProfitDisp+=(botProfit-botProfitDisp)*0.05;
  userLossDisp+=(userLoss-userLossDisp)*0.05;

  // Decay
  if(shakeAmt>0){shakeAmt*=0.72;if(shakeAmt<0.2)shakeAmt=0;}
  if(screenFlash>0)screenFlash=Math.max(0,screenFlash-0.038);
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life-=0.024;if(p.life<=0)parts.splice(i,1);}
  for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vx*=0.88;s.vy*=0.88;s.life-=0.034;if(s.life<=0)sparks.splice(i,1);}
  for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.r+=(r.maxR-r.r)*0.082;r.life-=0.022;if(r.life<=0)rings.splice(i,1);}
  for(let i=flashes.length-1;i>=0;i--){flashes[i].life-=0.05;if(flashes[i].life<=0)flashes.splice(i,1);}
  for(let i=ltns.length-1;i>=0;i--){ltns[i].life-=0.10;if(ltns[i].life<=0)ltns.splice(i,1);}
  for(let i=floatNums.length-1;i>=0;i--){const fn=floatNums[i];fn.y+=fn.vy;fn.vy*=0.97;fn.life-=0.015;if(fn.life<=0)floatNums.splice(i,1);}
  for(const d of bgDots){d.x+=d.vx;d.y+=d.vy;if(d.x<0)d.x=W;if(d.x>W)d.x=0;if(d.y<0)d.y=H;if(d.y>H)d.y=0;}
  for(const l of botLogs) l.life=Math.max(0.12,l.life-0.003);
  for(const l of userLogs) l.life=Math.max(0.12,l.life-0.003);
}

// ══════ DRAW HELPERS ══════
function panel(x,y,w,h,r,bg,brd){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(bg){ctx.fillStyle=bg;ctx.fill();}
  if(brd){ctx.strokeStyle=brd;ctx.lineWidth=1;ctx.stroke();}
}
function lbl(txt,x,y,font,col,align,base,glow){
  ctx.font=font;ctx.textAlign=align||'left';ctx.textBaseline=base||'top';
  if(glow){ctx.shadowColor=col;ctx.shadowBlur=glow;}
  ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.shadowBlur=0;
}
function hexRGB(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

// ══════ TOP BAR ══════
function drawTopBar(){
  const t=(frameN%CYCLE)/CYCLE, p=getETH(frameN);
  const inExec=t>=PH_EXEC&&t<PH_RESULT, inRes=t>=PH_RESULT;
  ctx.fillStyle='rgba(5,6,10,0.98)';ctx.fillRect(0,0,W,TOP);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,TOP);ctx.lineTo(W,TOP);ctx.stroke();

  // Left: bot name
  ctx.font='900 13px Inter';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,255,170,0.75)';ctx.shadowColor='#00ffaa';ctx.shadowBlur=inExec?12:4;
  ctx.fillText('MEV BOT',LX,TOP*0.45);ctx.shadowBlur=0;
  ctx.font='600 9px JetBrains Mono';ctx.fillStyle='rgba(0,255,170,0.22)';ctx.textBaseline='middle';
  ctx.fillText('0xB0T...3F7a',LX,TOP*0.45+15);

  // Right: user name
  ctx.font='900 13px Inter';ctx.textAlign='right';ctx.textBaseline='middle';
  const uCol=inRes?'rgba(255,92,92,0.8)':'rgba(238,240,248,0.4)';
  ctx.fillStyle=uCol;if(inRes){ctx.shadowColor='#ff5c5c';ctx.shadowBlur=8;}
  ctx.fillText('USER',W-LX,TOP*0.45);ctx.shadowBlur=0;
  ctx.font='600 9px JetBrains Mono';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillStyle=inRes?'rgba(255,92,92,0.22)':'rgba(238,240,248,0.15)';
  ctx.fillText('0xDe12...3B8c',W-LX,TOP*0.45+15);

  // Center: ETH price
  const pCol=inExec?'#00ffaa':inRes?'#ff5c5c':'#eef0f8';
  ctx.font='900 21px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=pCol;ctx.shadowColor=pCol;ctx.shadowBlur=inExec||inRes?12:3;
  ctx.fillText('ETH  $'+fmt2(p),CX,TOP*0.42);ctx.shadowBlur=0;

  // Phase label
  const phases=[
    {mn:0,mx:PH_DETECT, txt:'МОНИТОРИНГ МЕМПУЛА',col:'rgba(0,255,170,0.2)'},
    {mn:PH_DETECT,mx:PH_CALC,txt:'ЖЕРТВА ОБНАРУЖЕНА',col:'rgba(153,102,255,0.55)'},
    {mn:PH_CALC,mx:PH_BID,txt:'СЧИТАЮ ПРИБЫЛЬ...',col:'rgba(245,200,66,0.55)'},
    {mn:PH_BID,mx:PH_EXEC,txt:'ФРОНТРАН ОТПРАВЛЕН',col:'rgba(0,255,170,0.65)'},
    {mn:PH_EXEC,mx:PH_RESULT,txt:'БЛОК ПОДТВЕРЖДЁН ✓',col:'rgba(0,255,170,0.8)'},
    {mn:PH_RESULT,mx:2,txt:'ПРОФИТ ЗАФИКСИРОВАН',col:'rgba(0,255,170,0.7)'},
  ];
  let ph=phases[0]; for(const p2 of phases) if(t>=p2.mn) ph=p2;
  ctx.font='700 9px Inter';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillStyle=ph.col;ctx.fillText(ph.txt,CX,TOP-4);
}

// ══════ BOTTOM BAR ══════
function drawBottomBar(){
  const t=(frameN%CYCLE)/CYCLE;
  ctx.fillStyle='rgba(5,6,10,0.98)';ctx.fillRect(0,BOT,W,H-BOT);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,BOT);ctx.lineTo(W,BOT);ctx.stroke();
  const bMid=BOT+(H-BOT)*0.5;
  const bd=Math.round(botProfitDisp), ud=Math.round(userLossDisp);
  const bc=bd>5?'#00ffaa':'rgba(238,240,248,0.3)';
  const uc=ud>5?'#ff5c5c':'rgba(238,240,248,0.25)';
  ctx.font=bd>5?'900 26px Inter':'900 20px Inter';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillStyle=bc;ctx.shadowColor=bc;ctx.shadowBlur=bd>5?14:0;
  ctx.fillText(bd>5?'+$'+bd.toLocaleString():'$0',LX,bMid);ctx.shadowBlur=0;
  ctx.font='600 9px Inter';ctx.textAlign='left';ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,255,170,0.22)';ctx.fillText(bd>5?'ПРОФИТ БОТА':'Ждёт',LX,bMid-12);
  ctx.font=ud>5?'900 26px Inter':'900 20px Inter';
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillStyle=uc;ctx.shadowColor=uc;ctx.shadowBlur=ud>5?12:0;
  ctx.fillText(ud>5?'-$'+ud.toLocaleString():'$0',W-LX,bMid);ctx.shadowBlur=0;
  ctx.font='600 9px Inter';ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(255,92,92,0.22)';ctx.fillText(ud>5?'SLIPPAGE ЮЗЕРА':'Не в позиции',W-LX,bMid-12);
  if(t>=PH_RESULT){
    ctx.font='700 10px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(238,240,248,0.1)';ctx.fillText('vs',CX,bMid);
  }
}

// ══════ LEFT: MEV BOT ══════
function drawBot(){
  const t=(frameN%CYCLE)/CYCLE;
  const pulse=0.6+0.4*Math.sin(frameN*0.13);
  const inExec=t>=PH_EXEC;
  const inBid=t>=PH_BID;

  // Side bg
  const sbg=ctx.createLinearGradient(0,TOP,CX,TOP);
  sbg.addColorStop(0,'rgba(0,18,10,0.5)');sbg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sbg;ctx.fillRect(0,TOP,CX,BOT-TOP);

  // ── BOT STATUS ──
  let y=TOP+8;
  panel(LX,y,LW,24,5,'rgba(0,14,7,0.9)','rgba(0,255,170,0.1)');
  const statTxt=t<PH_DETECT?'● SCANNING MEMPOOL...':t<PH_CALC?'⚡ TARGET LOCKED':t<PH_BID?'◈ CALCULATING...':t<PH_EXEC?'▲ FRONTRUN SENT':inExec?'✓ EXECUTED':'IDLE';
  const statCol=t<PH_DETECT?'rgba(0,255,170,0.3)':t<PH_BID?'rgba(153,102,255,0.75)':t<PH_EXEC?'rgba(245,200,66,0.8)':'#00ffaa';
  lbl(statTxt,LX+8,y+6,'700 9px JetBrains Mono',statCol,'left','top',inExec?8:0);
  y+=32;

  // ── MEMPOOL SCANNER ──
  const mH=168;
  panel(LX,y,LW,mH,8,'rgba(0,10,5,0.92)','rgba(0,255,170,0.07)');
  lbl('MEMPOOL',LX+8,y+7,'700 8px Inter','rgba(0,255,170,0.22)','left','top');
  // Scroll offset based on time
  const scrollOff=(frameN*0.15)%28;
  const victimVisible=t>=PH_DETECT;
  ctx.save(); ctx.beginPath(); ctx.roundRect(LX,y,LW,mH,8); ctx.clip();
  const allRows=[...MEMPOOL_FAKE,(victimVisible?{...VICTIM_TX,isVictim:true}:null),...MEMPOOL_FAKE.slice(0,2)].filter(Boolean);
  let ry=y+20-scrollOff;
  for(const row of allRows){
    if(ry>y+mH||ry<y-2){ry+=26;continue;}
    const isV=row.isVictim;
    const fp=0.5+0.5*Math.sin(frameN*0.18);

  // ── PROFIT CALC ──

    const lines=[
      {lbl:'BUY 10 ETH @ 3241.0',val:'$32,410',col:'rgba(238,240,248,0.4)'},
      {lbl:'SELL 10 ETH @ 3248.8',val:'$32,488',col:'rgba(0,255,170,0.5)'},
      {lbl:'GROSS PROFIT',val:'+$78',col:'rgba(0,255,170,0.7)'},
      {lbl:'SLIPPAGE CAPTURE',val:'+$162',col:'rgba(0,255,170,0.7)'},
      {lbl:'GAS COST (52 gwei)',val:'-$12',col:'rgba(255,92,92,0.5)'},
    ];

    for(let i=0;i<visCount;i++){

    }
    if(calcDone){
      ctx.fillStyle='rgba(0,255,170,0.07)';ctx.fillRect(LX,y+93,LW,calcH-93);
      lbl('NET: +$226',LX+8,y+96,'900 13px Inter','#00ffaa','left','top',10);
      lbl('✓ EXECUTE',LX+LW-8,y+96,'800 11px Inter','rgba(0,255,170,0.7)','right','top');

  } else {
    lbl('Ожидаю жертву...',LX+LW*0.5,y+calcH*0.5,'600 9px Inter','rgba(0,255,170,0.15)','center','middle');
  }
  y+=calcH+8;

  // ── GAS AUCTION ──
  const gasH=90;
  panel(LX,y,LW,gasH,8,'rgba(0,12,6,0.92)',inBid?'rgba(245,200,66,0.18)':'rgba(0,255,170,0.06)');

  const gasRows=[
    {label:'VICTIM',gwei:13,col:'#9966ff'},
    {label:'OTHERS',gwei:11,col:'rgba(238,240,248,0.2)'},
    {label:'BOT ⚡',gwei:52,col:'#f5c842',bot:true},
  ];
  const maxGwei=60;
  for(let i=0;i<gasRows.length;i++){
    const gr=gasRows[i];
    const gy=y+22+i*20;
    const bw2=(gr.gwei/maxGwei)*(LW-64)*(gr.bot&&inBid?1:gr.bot?0:1);

    // Bar
    const fp2=gr.bot?(0.7+0.3*Math.sin(frameN*0.18)):1;
    if(bw2>0){
      ctx.fillStyle=gr.bot?`rgba(245,200,66,${0.7*fp2})`:gr.col;
      ctx.fillRect(LX+50,gy-5,bw2,10);
      if(gr.bot){ctx.shadowColor='#f5c842';ctx.shadowBlur=6*fp2;ctx.fillRect(LX+50,gy-5,bw2,10);ctx.shadowBlur=0;}
    }
    lbl(gr.gwei+' gwei',LX+LW-6,gy,'700 8px JetBrains Mono',gr.col,'right','middle');
  }
  if(inBid){
    const fp3=0.5+0.5*Math.sin(frameN*0.2);
    lbl('BOT WINS PRIORITY SLOT',LX+LW*0.5,y+gasH-8,'800 8px Inter',`rgba(0,255,170,${0.5+fp3*0.3})`,'center','bottom');
  }
  y+=gasH+8;

  // ── BLOCK VISUALIZER ──
  const blkH=120;
  panel(LX,y,LW,blkH,8,'rgba(0,12,6,0.92)','rgba(0,255,170,0.07)');
  lbl('BLOCK #22841094',LX+8,y+7,'700 8px Inter','rgba(0,255,170,0.22)','left','top');
  if(t>=PH_BID){
    // Tx slots in block
    const slots=[
      {label:'Tx #1  BOT FRONTRUN',col:'#00ffaa',bot:true, done:t>=PH_EXEC},
      {label:'Tx #2  VICTIM SWAP',col:'#9966ff',bot:false, done:t>=PH_EXEC},
      {label:'Tx #3  Pending...',col:'rgba(238,240,248,0.15)',bot:false,done:false},
    ];
    for(let i=0;i<slots.length;i++){
      const sl=slots[i];
      const sy2=y+22+i*28;
      const showProg=t<PH_EXEC&&i===0?blockProgress:1;
      const slVisible = i===0?t>=PH_BID : i===1?t>=PH_DETECT : t>=PH_BID;
      if(!slVisible) continue;
      const slAlpha=clamp((blockProgress-(i===0?0:i===1?0.3:0.6))*3,0,1);
      ctx.globalAlpha=slAlpha;
      // Row bg
      ctx.fillStyle=sl.done?`rgba(${sl.bot?'0,255,170':'153,102,255'},0.08)`:'rgba(255,255,255,0.02)';
      ctx.beginPath();ctx.roundRect(LX+4,sy2-3,LW-8,22,4);ctx.fill();
      if(sl.bot&&sl.done){
        const fp4=0.6+0.4*Math.sin(frameN*0.15);
        ctx.strokeStyle=`rgba(0,255,170,${0.35*fp4})`;ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(LX+4,sy2-3,LW-8,22,4);ctx.stroke();

      ctx.font='700 9px JetBrains Mono';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillStyle=sl.col;ctx.fillText(sl.label,LX+10,sy2+8);
      if(sl.done){
        ctx.font='700 8px Inter';ctx.textAlign='right';
        ctx.fillStyle=sl.bot?'rgba(0,255,170,0.7)':'rgba(153,102,255,0.6)';
        ctx.fillText('✓ DONE',LX+LW-8,sy2+8);
      } else if(i===0&&t<PH_EXEC){
        // Progress bar for block building
        const pbW=(LW-80)*blockProgress;
        ctx.fillStyle='rgba(245,200,66,0.15)';ctx.fillRect(LX+10,sy2+14,LW-20,4);
        ctx.fillStyle='rgba(245,200,66,0.6)';ctx.fillRect(LX+10,sy2+14,pbW,4);
      }
      ctx.globalAlpha=1;
    }
  } else {
    lbl('Ожидаю транзакцию...',LX+LW*0.5,y+blkH*0.5,'600 9px Inter','rgba(0,255,170,0.1)','center','middle');

  y+=blkH+8;

  // ── BOT LOG ──
  const logH=90;
  panel(LX,y,LW,logH,8,'rgba(0,10,5,0.9)','rgba(0,255,170,0.05)');
  lbl('EXECUTION LOG',LX+8,y+7,'700 8px Inter','rgba(0,255,170,0.18)','left','top');
  const defLogs=[{text:'[SYS] MEV Bot v4.1 — READY',col:'rgba(0,255,170,0.2)'},{text:'[SYS] Listening mempool...',col:'rgba(0,255,170,0.15)'}];
  const showLogs=botLogs.length>0?botLogs:defLogs;
  for(let i=0;i<Math.min(4,showLogs.length);i++){
    const e=showLogs[showLogs.length-1-i]; if(!e)continue;
    ctx.globalAlpha=clamp(e.life||1,0,1);
    ctx.font='600 8px JetBrains Mono';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle=e.col;ctx.fillText(e.text,LX+6,y+20+(3-i)*16);
    ctx.globalAlpha=1;

  // ── BOT BALANCE ──
  y+=logH+8;
  const balH=72;
  const bd=Math.round(botProfitDisp);
  panel(LX,y,LW,balH,8,bd>5?'rgba(0,18,10,0.9)':'rgba(0,10,5,0.9)',bd>5?'rgba(0,255,170,0.22)':'rgba(0,255,170,0.06)');
  lbl('БАЛАНС',LX+8,y+8,'700 8px Inter','rgba(238,240,248,0.2)','left','top');
  lbl('ПРОФИТ',LX+LW-8,y+8,'700 8px Inter','rgba(0,255,170,0.22)','right','top');
  lbl('$'+Math.round(800000+bd).toLocaleString(),LX+8,y+42,'900 18px Inter','#eef0f8','left','middle',bd>5?4:0);
  lbl((bd>0?'+':'')+'$'+bd.toLocaleString(),LX+LW-8,y+42,'900 20px Inter',bd>5?'#00ffaa':'rgba(238,240,248,0.2)','right','middle',bd>5?12:0);
}

  const inPending=t>=PH_BID&&t<PH_EXEC;

  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.arc(RX+RW*0.5,y+90,10,0,Math.PI*2);ctx.fill();
  lbl('↓',RX+RW*0.5,y+90,'800 12px Inter','rgba(238,240,248,0.3)','center','middle');

  // To

    const fp5=0.5+0.5*Math.sin(frameN*0.18);
    lbl('⚠ Slippage exceeded: 0.76%',RX+RW-10,y+164,'700 9px Inter',`rgba(255,92,92,${0.5+fp5*0.3})`,'right','top',inCrash?6:0);

  y+=swapH+8;

  // ── TX STATUS ──

  panel(RX,y,RW,txH,8,'rgba(8,9,15,0.92)',txBrd);

    lbl('—',RX+RW*0.5,y+txH*0.5,'600 10px Inter','rgba(238,240,248,0.12)','center','middle');

    const fp6=0.5+0.5*Math.sin(frameN*0.2);
    const txStat=inCrash?'✓ CONFIRMED (pos #2)':inPending?'PENDING...':t>=PH_EXEC?'CONFIRMED':'SUBMITTED';
    const txCol=inCrash?'rgba(255,92,92,0.7)':inPending?`rgba(245,200,66,${0.5+fp6*0.3})`:t>=PH_EXEC?'rgba(153,102,255,0.65)':'rgba(0,255,170,0.4)';
    if(inPending){
      const pw=(t-PH_BID)/(PH_EXEC-PH_BID);
      ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(RX+8,y+30,RW-16,8);
      ctx.fillStyle=`rgba(245,200,66,${0.4+fp6*0.2})`;ctx.fillRect(RX+8,y+30,Math.max(0,(RW-16)*pw),8);

      lbl('Кто-то платит больше газа...?',RX+8,y+68,'600 8px Inter','rgba(245,200,66,0.3)','left','top');

  // ── CHART ──
  const cH=190;
  const ETH_MIN=3232,ETH_MAX=3256;
  const pY=v=>y+cH-clamp((v-ETH_MIN)/(ETH_MAX-ETH_MIN),0,1)*cH;
  panel(RX,y,RW,cH,8,'rgba(5,8,12,0.95)','rgba(255,255,255,0.04)');
  ctx.save();ctx.beginPath();ctx.roundRect(RX,y,RW,cH,8);ctx.clip();
  for(let v=ETH_MIN;v<=ETH_MAX;v+=5){
    ctx.beginPath();ctx.moveTo(RX,pY(v));ctx.lineTo(RX+RW,pY(v));
    ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.8;ctx.stroke();

  ctx.fillStyle='rgba(0,0,0,0.04)';for(let sy2=y;sy2<y+cH;sy2+=3)ctx.fillRect(RX,sy2,RW,1.2);
  const n=Math.min(RW,ethHist.length);
  ctx.beginPath();
  for(let i=0;i<n;i++){const py2=pY(ethHist[ethHist.length-n+i]);i===0?ctx.moveTo(RX+i,py2):ctx.lineTo(RX+i,py2);}
  ctx.lineTo(RX+n-1,y+cH);ctx.lineTo(RX,y+cH);ctx.closePath();
  const fill=ctx.createLinearGradient(0,y,0,y+cH);
  if(inCrash){fill.addColorStop(0,'rgba(255,92,92,0.15)');fill.addColorStop(1,'rgba(255,92,92,0.01)');}
  else if(t>=PH_EXEC){fill.addColorStop(0,'rgba(153,102,255,0.10)');fill.addColorStop(1,'rgba(0,0,0,0)');}

  ctx.fillStyle=fill;ctx.fill();
  ctx.beginPath();
  for(let i=0;i<n;i++){const py2=pY(ethHist[ethHist.length-n+i]);i===0?ctx.moveTo(RX+i,py2):ctx.lineTo(RX+i,py2);}
  const lc2=inCrash?'#ff5c5c':t>=PH_EXEC?'rgba(153,102,255,0.7)':'rgba(238,240,248,0.45)';
  ctx.strokeStyle=lc2;ctx.lineWidth=1.8;ctx.shadowColor=lc2;ctx.shadowBlur=inCrash?12:4;ctx.stroke();ctx.shadowBlur=0;
  // Frontrun marker
  if(t>=PH_EXEC){
    const mkF=Math.floor(PH_EXEC*CYCLE);
    const mkOff=Math.floor(frameN%CYCLE)-mkF;
    const mkX=RX+Math.max(0,n-mkOff-1);
    if(mkX>RX&&mkX<RX+RW){
      ctx.beginPath();ctx.moveTo(mkX,y);ctx.lineTo(mkX,y+cH);
      ctx.strokeStyle='rgba(0,255,170,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.stroke();ctx.setLineDash([]);
      lbl('BOT',mkX,y+5,'700 7px Inter','rgba(0,255,170,0.4)','center','top');
    }
  }
  ctx.restore();
  const lv2=ethHist[ethHist.length-1],lvy=pY(lv2);
  ctx.beginPath();ctx.arc(RX+RW-1,lvy,4,0,Math.PI*2);
  ctx.fillStyle=lc2;ctx.shadowColor=lc2;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(RX+RW-1,lvy,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  lbl('ГРАФИК  ETH/USDC',RX+8,y+7,'700 8px Inter','rgba(238,240,248,0.14)','left','top');
  lbl('$'+fmt2(getETH(frameN)),RX+RW-6,y+7,'700 9px JetBrains Mono',lc2,'right','top');
  y+=cH+8;

  // ── RESULT COMPARISON ──
  const resH=100;
  panel(RX,y,RW,resH,8,inCrash?'rgba(18,4,4,0.92)':'rgba(8,9,15,0.9)',inCrash?'rgba(255,92,92,0.2)':'rgba(255,255,255,0.04)');
  lbl('ИТОГ СВАПА',RX+8,y+8,'700 8px Inter','rgba(238,240,248,0.18)','left','top');
  if(t>=PH_EXEC){
    const lines2=[
      {lbl:'Ожидал получить:',val:'32,410 USDC',col:'rgba(238,240,248,0.4)'},

      {lbl:'Куда ушло:',val:'MEV бот ¯\\_(ツ)_/¯',col:'rgba(153,102,255,0.55)'},
    ];
    for(let i=0;i<lines2.length;i++){
      const ln=lines2[i];
      const la=clamp((t-PH_EXEC)*CYCLE/160-i*0.5,0,1);

      ctx.font='600 9px Inter';ctx.textAlign='left';ctx.textBaseline='top';
      ctx.fillStyle='rgba(238,240,248,0.28)';ctx.fillText(ln.lbl,RX+8,y+22+i*17);
      ctx.textAlign='right';ctx.fillStyle=ln.col;
      if(inCrash&&i===2){ctx.shadowColor='#ff5c5c';ctx.shadowBlur=6;}
      ctx.fillText(ln.val,RX+RW-8,y+22+i*17);ctx.shadowBlur=0;
      ctx.globalAlpha=1;
    }
  } else {
    lbl('Ожидаю подтверждения...',RX+RW*0.5,y+resH*0.5,'600 9px Inter','rgba(238,240,248,0.12)','center','middle');
  }

  // ── USER LOG ──
  const ulogH=82;
  panel(RX,y,RW,ulogH,8,'rgba(8,9,15,0.9)','rgba(255,255,255,0.04)');
  lbl('ИСТОРИЯ',RX+8,y+8,'700 8px Inter','rgba(238,240,248,0.18)','left','top');
  const uDefLogs=[{text:'Открываю позицию...',col:'rgba(238,240,248,0.15)'}];
  const showU=userLogs.length>0?userLogs:uDefLogs;
  for(let i=0;i<Math.min(4,showU.length);i++){
    const e=showU[showU.length-1-i];if(!e)continue;
    ctx.globalAlpha=clamp(e.life||1,0,1);
    ctx.font='600 8px JetBrains Mono';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle=e.col;ctx.fillText(e.text,RX+6,y+20+(3-i)*15);ctx.globalAlpha=1;
  }
}

// ══════ DRAW MAIN ══════
function draw(){
  const sx=shakeAmt>0?rnd(-shakeAmt,shakeAmt):0;
  const sy=shakeAmt>0?rnd(-shakeAmt,shakeAmt):0;
  ctx.save();ctx.translate(sx,sy);
  ctx.fillStyle='#06070c';ctx.fillRect(-20,-20,W+40,H+40);
  for(const d of bgDots){ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=d.col;ctx.globalAlpha=d.a;ctx.fill();ctx.globalAlpha=1;}

  drawBot();
  drawUser();

  // Divider
  const dPulse=0.03+0.02*Math.sin(frameN*0.07);
  ctx.strokeStyle=`rgba(255,255,255,${dPulse})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(CX,TOP);ctx.lineTo(CX,BOT);ctx.stroke();
  // Divider glow at center
  const t2=(frameN%CYCLE)/CYCLE;
  if(t2>=PH_EXEC){
    const dg=ctx.createRadialGradient(CX,H*0.42,0,CX,H*0.42,80);
    dg.addColorStop(0,'rgba(0,255,170,0.06)');dg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=dg;ctx.fillRect(CX-80,TOP,160,BOT-TOP);
  }

  // Data stream particles on divider (bot harvesting data)
  if(t2>=PH_DETECT&&t2<PH_EXEC){
    const streamCount=6;
    for(let i=0;i<streamCount;i++){
      const py=(( frameN*2+i*(H/streamCount))%H);
      const pa=Math.sin(frameN*0.1+i)*0.5+0.5;
      ctx.beginPath();ctx.arc(CX,py,1.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,255,170,${pa*0.4})`;ctx.fill();
    }
  }

  // Effects
  for(const r of rings){ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.strokeStyle=r.col;ctx.lineWidth=r.life*(r.thick?4:2);ctx.globalAlpha=r.life*0.65;ctx.shadowColor=r.col;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}
  for(const l of ltns) drawLtn(l.x1,l.y1,l.x2,l.y2,l.col,l.life*0.85,1.5);
  for(const p of parts){ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.3,p.r*p.life),0,Math.PI*2);ctx.fillStyle=p.col;ctx.globalAlpha=p.life;ctx.shadowColor=p.col;ctx.shadowBlur=5;ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}
  for(const s of sparks){const ex=s.x-s.vx*s.len*(0.4+s.life*0.6),ey=s.y-s.vy*s.len*(0.4+s.life*0.6);ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(ex,ey);ctx.strokeStyle=s.col;ctx.lineWidth=s.life*2.2;ctx.globalAlpha=s.life*0.8;ctx.shadowColor=s.col;ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}
  for(const f of flashes){const pp=Math.max(0,1-f.life);ctx.beginPath();ctx.arc(f.x,f.y,4+pp*90,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${f.life*0.08})`;ctx.fill();ctx.beginPath();ctx.arc(f.x,f.y,2+pp*28,0,Math.PI*2);ctx.fillStyle=`rgba(200,255,230,${f.life*0.75})`;ctx.fill();}
  for(const fn of floatNums){ctx.font=fn.big?`900 ${Math.round(15+fn.life*5)}px Inter`:'800 10px Inter';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=fn.col;ctx.globalAlpha=fn.life;ctx.shadowColor=fn.col;ctx.shadowBlur=fn.big?18:7;ctx.fillText(fn.text,fn.x,fn.y);ctx.shadowBlur=0;ctx.globalAlpha=1;}

  ctx.restore();
  drawTopBar();
  drawBottomBar();

  if(screenFlash>0){
    if(screenFlash>0.7){ctx.fillStyle=`rgba(255,255,255,${(screenFlash-0.7)*0.28})`;ctx.fillRect(0,0,W,H);}
    ctx.fillStyle=`rgba(0,255,170,${Math.min(1,screenFlash)*0.1})`;ctx.fillRect(0,0,W,H);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
document.fonts.ready.then(()=>requestAnimationFrame(loop));
</script>
</body>
